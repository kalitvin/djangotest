{% extends "blog/base.html" %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
  <h2>Введите новый пароль</h2>

  {% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить новый пароль</button>
    </form>
  {% else %}
    <p>Ссылка для сброса пароля недействительна или устарела.</p>
  {% endif %}
{% endblock %}
