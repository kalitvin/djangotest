{% extends "blog/base.html" %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
  <h2>Сброс пароля</h2>
  <p>Введите email, указанный при регистрации. На него будет отправлена ссылка для смены пароля.</p>

  <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Отправить письмо</button>
  </form>
{% endblock %}
