{% extends "blog/base.html" %}

{% block title %}Редактирование поста{% endblock %}

{% block content %}
    <h2>Редактировать пост: "{{ post.title }}"</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить изменения</button>
    </form>

    <p>
        <a href="{% url 'post_detail' pk=post.pk %}">← Вернуться к посту</a> |
        <a href="{% url 'post_list' %}">К списку постов</a>
    </p>
{% endblock %}
